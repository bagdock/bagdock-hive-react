name: Publish
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event.release.target_commitish == 'main'
    environment: npm-publish
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Wait for @bagdock/hive on npm
        run: |
          RANGE=$(jq -r '.dependencies["@bagdock/hive"]' package.json)
          echo "Waiting for @bagdock/hive@${RANGE} on npm..."
          for i in $(seq 1 30); do
            if npm view "@bagdock/hive@${RANGE}" version >/dev/null 2>&1; then
              echo "Found @bagdock/hive matching ${RANGE}"
              exit 0
            fi
            echo "Attempt ${i}/30 — not available yet, waiting 10s..."
            sleep 10
          done
          echo "::error::Timed out waiting for @bagdock/hive@${RANGE} on npm"
          exit 1

      - run: bun install
      - run: bun run build
      - run: npx npm@latest publish --provenance --access public
